apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-worker-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-worker
  template:
    metadata:
      labels:
        app: ai-worker
    spec:
      containers:
      - name: ai-brain
        image: enesdemir09/vision-ai-worker:v1
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: ai-worker-config
        volumeMounts:
        - name: image-storage
          mountPath: /app/uploads
        resources:
          # AI Worker gets the most resources — TensorFlow needs headroom.
          # Limits prevent it from OOM-killing other pods on the same node.
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
      volumes:
      - name: image-storage
        persistentVolumeClaim:
          claimName: image-storage-pvc
