apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-worker-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-worker
  template:
    metadata:
      labels:
        app: ai-worker
    spec:
      # visionmetric-worker SA is annotated with the IRSA role ARN in EKS.
      # In Kind (local) the SA exists but has no IRSA — STORAGE_TYPE=local so
      # boto3 is never called and no AWS credentials are needed.
      serviceAccountName: visionmetric-worker
      containers:
      - name: ai-brain
        image: ai-worker:latest
        imagePullPolicy: IfNotPresent
        envFrom:
        - configMapRef:
            name: ai-worker-config
        volumeMounts:
        - name: image-storage
          mountPath: /app/uploads
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
      volumes:
      - name: image-storage
        persistentVolumeClaim:
          claimName: image-storage-pvc
