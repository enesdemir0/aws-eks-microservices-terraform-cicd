apiVersion: v1
kind: ConfigMap
metadata:
  name: metadata-config
data:
  # Non-sensitive connection parameters only — no passwords here
  DB_USER: "postgres"
  DB_NAME: "metadata_db"
  # K8s internal DNS: resolves to metadata-db-service ClusterIP
  DB_HOST: "metadata-db-service"
  PORT: "8001"
  APP_ENV: "development"
  # For EKS + RDS: override DB_HOST, DB_USER, DB_NAME via a K8s Secret
  # and point DATABASE_URL at the RDS endpoint in your CI/CD pipeline.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metadata-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metadata-api
  template:
    metadata:
      labels:
        app: metadata-api
    spec:
      containers:
      - name: metadata-api
        image: metadata-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8001
        env:
        - name: DB_USER
          valueFrom:
            configMapKeyRef:
              name: metadata-config
              key: DB_USER
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: metadata-config
              key: DB_NAME
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: metadata-config
              key: DB_HOST
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: metadata-config
              key: PORT
        # Secret injected separately — never appears in ConfigMap
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: metadata-secrets
              key: DB_PASSWORD
        - name: DATABASE_URL
          value: "postgresql://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):5432/$(DB_NAME)"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 30
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: metadata-api-service
spec:
  selector:
    app: metadata-api
  ports:
    - port: 8001
      targetPort: 8001
