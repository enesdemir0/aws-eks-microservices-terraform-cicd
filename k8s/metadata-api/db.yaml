apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: metadata-db-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # For EKS with EBS: uncomment the line below (gp3 is preferred over gp2)
  # storageClassName: gp3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metadata-db-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metadata-db
  template:
    metadata:
      labels:
        app: metadata-db
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_DB
          value: "metadata_db"
        # Uses its own dedicated Secret — isolated from auth-db credentials
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: metadata-secrets
              key: DB_PASSWORD
        volumeMounts:
        - name: storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "postgres"]
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 6
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: metadata-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: metadata-db-service
spec:
  selector:
    app: metadata-db
  ports:
    - port: 5432
      targetPort: 5432
