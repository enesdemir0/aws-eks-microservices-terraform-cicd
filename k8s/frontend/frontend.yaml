apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
data:
  # Server-side (SSR) URLs — resolved via K8s internal DNS, never leave the cluster
  AUTH_SERVICE_URL: "http://auth-service:3000"
  GATEWAY_SERVICE_URL: "http://gateway-service:8000"
  METADATA_API_URL: "http://metadata-api-service:8001"
  # Client-side public base URL — the single Ingress entry point seen by browsers.
  # For EKS: override this in CI with your ALB hostname or Route53 domain.
  NEXT_PUBLIC_API_BASE_URL: "http://localhost"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: nextjs-app
        image: frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3001
        envFrom:
        - configMapRef:
            name: frontend-config
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /
            port: 3001
          initialDelaySeconds: 20
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /
            port: 3001
          initialDelaySeconds: 40
          periodSeconds: 30
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  selector:
    app: frontend
  ports:
    - port: 3001
      targetPort: 3001
