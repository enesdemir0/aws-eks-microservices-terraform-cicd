apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
data:
  PORT:             "8000"
  NODE_ENV:         "development"
  AUTH_SERVICE_URL: "http://auth-service:3000"
  REDIS_URL:        "redis://redis-service:6379/0"
  # Storage — "local" for Kind/Docker Compose, "s3" in EKS.
  # deploy-aws.yml patches STORAGE_TYPE and AWS_S3_BUCKET before deploying.
  STORAGE_TYPE:  "local"
  UPLOAD_DIR:    "/app/uploads"
  AWS_S3_BUCKET: ""
  AWS_REGION:    "eu-central-1"
