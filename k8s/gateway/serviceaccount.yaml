apiVersion: v1
kind: ServiceAccount
metadata:
  name: visionmetric-worker
  # In EKS, deploy-aws.yml patches this annotation with the IRSA role ARN:
  #   kubectl annotate sa visionmetric-worker \
  #     eks.amazonaws.com/role-arn=arn:aws:iam::ACCOUNT:role/visionmetric-worker-irsa-role
  # In Kind (local) this SA has no annotation — STORAGE_TYPE=local so
  # no AWS calls are made and no credentials are needed.
