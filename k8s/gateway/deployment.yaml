apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
      - name: gateway-api
        image: gateway-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: gateway-config
        volumeMounts:
        - name: image-storage
          mountPath: /app/uploads # This matches UPLOAD_DIR in ConfigMap
      volumes:
      - name: image-storage
        persistentVolumeClaim:
          claimName: image-storage-pvc