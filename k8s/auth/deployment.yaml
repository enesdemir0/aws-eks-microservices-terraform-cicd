containers:
      - name: auth-api
        image: auth-service:latest
        env:
        # 1. Get non-secrets from ConfigMap
        - name: DB_USER
          valueFrom:
            configMapKeyRef:
              name: auth-config
              key: DB_USER
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: auth-config
              key: DB_NAME
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: auth-config
              key: DB_HOST
        
        # 2. Get secrets from Secret
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: auth-secrets
              key: DB_PASSWORD
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: auth-secrets
              key: JWT_SECRET

        # 3. Construct the DATABASE_URL (The "Master" Pipe)
        # Kubernetes will replace these $(VAR) with the values above!
        - name: DATABASE_URL
          value: "postgresql://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):5432/$(DB_NAME)"