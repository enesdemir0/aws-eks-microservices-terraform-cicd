services:
  # --- DATABASE (PostgreSQL) ---
  main-db:
    image: postgres:15-alpine
    container_name: main-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-superpassword}
      POSTGRES_DB: ${DB_NAME:-auth_db}
    ports:
      - "5432:5432"
    volumes:
      - ./infra/local/init-db:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    networks:
      - microservices-network

  # --- CACHE & QUEUE (Redis) ---
  task-queue:
    image: redis:7-alpine
    container_name: redis-queue
    ports:
      - "6379:6379"
    networks:
      - microservices-network

  # --- AUTH SERVICE (Node.js) ---
  auth-service:
    build:
      context: ./services/auth-service
    container_name: auth-app
    depends_on:
      - main-db
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-superpassword}@main-db:5432/${DB_NAME:-auth_db}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
    ports:
      - "3000:3000"
    networks:
      - microservices-network

  # --- GATEWAY SERVICE (FastAPI) ---
  gateway-service:
    build:
      context: ./services/gateaway
    container_name: gateway-app
    depends_on:
      - auth-service
      - task-queue
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      AUTH_SERVICE_URL: http://auth-service:3000
      REDIS_URL: redis://task-queue:6379/0
      REDIS_QUEUE_NAME: image_tasks
      UPLOAD_DIR: /app/uploads
      STORAGE_TYPE: local
    ports:
      - "8000:8000"
    volumes:
      # This folder is shared with the AI Worker
      - ./services/gateaway/uploads:/app/uploads
    networks:
      - microservices-network

  # --- AI WORKER SERVICE (Python/TensorFlow) ---
  ai-worker:
    build:
      context: ./services/ai-worker
    container_name: ai-worker
    depends_on:
      - task-queue
    environment:
      REDIS_URL: redis://task-queue:6379/0
      TASK_QUEUE: image_tasks
    volumes:
      # CRITICAL: The worker reads from the same physical folder as the Gateway
      - ./services/gateaway/uploads:/app/uploads
    networks:
      - microservices-network

networks:
  microservices-network:
    driver: bridge

volumes:
  postgres_data: