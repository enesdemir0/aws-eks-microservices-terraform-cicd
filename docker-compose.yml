services:
  # 1. Auth Database
  main-db:
    image: postgres:15-alpine
    container_name: main-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-superpassword}
      POSTGRES_DB: ${DB_NAME:-auth_db}
    ports:
      - "5432:5432"
    volumes:
      - ./infra/local/init-db:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    networks:
      - microservices-network

  # 2. Metadata Database (Port 5433)
  metadata-db:
    image: postgres:15-alpine
    container_name: metadata-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-superpassword}
      POSTGRES_DB: metadata_db
    ports:
      - "5433:5432"
    volumes:
      - metadata_db_data:/var/lib/postgresql/data
    networks:
      - microservices-network

  # 3. Redis Queue
  task-queue:
    image: redis:7-alpine
    container_name: redis-queue
    ports:
      - "6379:6379"
    networks:
      - microservices-network

  # 4. Auth Service (Node.js)
  auth-service:
    build:
      context: ./services/auth-service
    container_name: auth-app
    depends_on:
      - main-db
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-superpassword}@main-db:5432/${DB_NAME:-auth_db}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "3000:3000"
    networks:
      - microservices-network

  # 5. Gateway Service (FastAPI)
  gateway-service:
    build:
      context: ./services/gateaway
    container_name: gateway-app
    depends_on:
      - auth-service
      - task-queue
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      AUTH_SERVICE_URL: http://auth-service:3000
      REDIS_URL: redis://task-queue:6379/0
      REDIS_QUEUE_NAME: image_tasks
      UPLOAD_DIR: /app/uploads
      STORAGE_TYPE: local
    ports:
      - "8000:8000"
    volumes:
      - ./services/gateaway/uploads:/app/uploads
    networks:
      - microservices-network

  # 6. Metadata API Service (NEW - The Librarian)
  metadata-api:
    build:
      context: ./services/metadata-api
    container_name: metadata-app
    depends_on:
      - metadata-db
    environment:
      # It talks to its OWN database
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-superpassword}@metadata-db:5432/metadata_db
    ports:
      - "8001:8001"
    networks:
      - microservices-network

  # 7. AI Worker Service
  ai-worker:
    build:
      context: ./services/ai-worker
    container_name: ai-worker
    depends_on:
      - task-queue
      - metadata-api # It needs the Librarian to be ready
    environment:
      REDIS_URL: redis://task-queue:6379/0
      TASK_QUEUE: image_tasks
      # NEW: The worker needs to know where to send the results!
      METADATA_API_URL: http://metadata-api:8001/api/metadata/save
    volumes:
      - ./services/gateaway/uploads:/app/uploads
    networks:
      - microservices-network

networks:
  microservices-network:
    driver: bridge

volumes:
  postgres_data:
  metadata_db_data: