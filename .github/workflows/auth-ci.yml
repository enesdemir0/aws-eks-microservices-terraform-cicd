name: Auth Service CI

on:
  push:
    branches: [ main, "feature/**" ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    # This starts a real Postgres DB inside the GitHub Runner!
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: superpassword
          POSTGRES_DB: auth_db
        ports:
          - 5432:5432
        # Health check to make sure DB is ready before tests start
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: services/auth-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # We need to create the table in the CI database before running tests
      - name: Initialize Database
        run: |
          sudo apt-get install -y postgresql-client
          psql -h localhost -U admin -d auth_db -f ../../infra/local/init-db/init.sql
        env:
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}

      - name: Run Tests
        run: npm test
        env:
          DATABASE_URL: postgresql://admin:${{ secrets.DB_PASSWORD }}@localhost:5432/auth_db
          JWT_SECRET: ${{ secrets.JWT_SECRET }}