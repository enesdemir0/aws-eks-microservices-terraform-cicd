name: Auth Service CI

on:
  push:
    branches: [ main, "feature/**" ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    # This starts a real Postgres DB inside the GitHub Runner!
  # 1. The Database Service
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres        # Use 'postgres' to match standard
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: auth_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # 2. Initialize Database (Notice the -U postgres)
      - name: Initialize Database
        run: |
          sudo apt-get install -y postgresql-client
          psql -h localhost -U postgres -d auth_db -f ../../infra/local/init-db/init.sql
        env:
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}

      # 3. Run Tests (Notice the postgres user in the URL)
      - name: Run Tests
        run: npm test
        env:
          DATABASE_URL: postgresql://postgres:${{ secrets.DB_PASSWORD }}@localhost:5432/auth_db
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NODE_ENV: test