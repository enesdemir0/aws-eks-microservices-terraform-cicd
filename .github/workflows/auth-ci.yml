name: Auth Service CI

on:
  push:
    branches: [ main, "feature/**" ] # Run on main and any feature branch
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    # This tells GitHub to look inside the auth-service folder
    defaults:
      run:
        working-directory: services/auth-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/auth-service/package-lock.json

      - name: Install dependencies
        run: npm ci # 'npm ci' is faster and cleaner for pipelines than 'npm install'

      - name: Run Tests
        run: npm test