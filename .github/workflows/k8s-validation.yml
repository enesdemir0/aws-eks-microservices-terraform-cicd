name: K8s Infrastructure Validation

on:
  push:
    branches: [ "feature/k8s-*" ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-cluster:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Start the Kind Cluster
      - name: Create Kind Cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: validation-cluster

          
      - name: Build and Load Images
        run: |
          docker build -t auth-service:latest ./services/auth-service
          docker build -t gateway-service:latest ./services/gateaway
          docker build -t metadata-api:latest ./services/metadata-api   # Add this
          docker build -t frontend:latest ./services/frontend           # Add this
          
          kind load docker-image auth-service:latest --name validation-cluster
          kind load docker-image gateway-service:latest --name validation-cluster
          kind load docker-image metadata-api:latest --name validation-cluster  # Add this
          kind load docker-image frontend:latest --name validation-cluster      # Add this

      - name: Apply All Manifests
        run: |
          kubectl apply -f k8s/shared/
          kubectl apply -f k8s/auth/
          kubectl apply -f k8s/gateway/
          kubectl apply -f k8s/ai-worker/
          kubectl apply -f k8s/metadata-api/ # Add this
          kubectl apply -f k8s/frontend/     # Add this

      - name: Wait for Pods
        run: |
          kubectl wait --for=condition=ready pod -l app=auth-service --timeout=120s
          kubectl wait --for=condition=ready pod -l app=gateway-service --timeout=120s
          kubectl wait --for=condition=ready pod -l app=metadata-api --timeout=120s
          kubectl wait --for=condition=ready pod -l app=frontend --timeout=120s
          kubectl wait --for=condition=ready pod -l app=ai-worker --timeout=300s