name: K8s Infrastructure Validation

on:
  push:
    branches: [ "feature/k8s-*" ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-cluster:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Start the Kind Cluster
      - name: Create Kind Cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: validation-cluster

      # 2. Build and "Inject" custom images
      - name: Build and Load Images
        run: |
          # Build Auth Service
          docker build -t auth-service:latest ./services/auth-service
          kind load docker-image auth-service:latest --name validation-cluster
          
          # Build Gateway Service
          docker build -t gateway-service:latest ./services/gateaway
          kind load docker-image gateway-service:latest --name validation-cluster

      # 3. Apply Manifests in order
      - name: Apply K8s Manifests
        run: |
          # First: Shared infrastructure (Storage/PVCs)
          kubectl apply -f k8s/shared/
          
          # Second: Auth Service & DB
          kubectl apply -f k8s/auth/
          
          # Third: Gateway Service
          kubectl apply -f k8s/gateway/

      # 4. Verification (Wait for the Pods to be "Ready")
      - name: Wait for Pods
        run: |
          # Wait for Auth
          kubectl wait --for=condition=ready pod -l app=auth-service --timeout=120s
          kubectl wait --for=condition=ready pod -l app=auth-db --timeout=120s
          
          # Wait for Gateway
          kubectl wait --for=condition=ready pod -l app=gateway-service --timeout=120s

      # 5. Debugging (Runs even if previous steps fail)
      - name: Show Cluster Status on Failure
        if: always()
        run: |
          echo "--- PODS ---"
          kubectl get pods
          echo "--- SERVICES ---"
          kubectl get services
          echo "--- STORAGE ---"
          kubectl get pvc